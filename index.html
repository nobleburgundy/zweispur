<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>ZWEISPUR</title>
  <style>
    :root {
      --bg:     #ffffff;
      --bg2:    #f5f5f5;
      --text:   #111111;
      --text2:  #666666;
      --text3:  #bbbbbb;
      --red:    #b5291c;
      --border: #e0e0e0;
      --accent: #1db954;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.4;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .top-bar {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding: 16px 24px 14px;
      padding-top: max(16px, calc(env(safe-area-inset-top, 0px) + 10px));
      display: flex;
      align-items: center;
    }
    .wordmark {
      flex: 1;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }
    .app-status {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
    }

    /* ── SCROLL CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ── TRACKS ── */
    .track-row { border-bottom: 1px solid var(--border); }

    .track-head {
      display: flex;
      align-items: center;
      padding: 13px 24px 11px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .track-id {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text3);
      width: 20px;
    }
    .track-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text2);
      flex: 1;
    }
    .track-state {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      min-width: 52px;
      text-align: right;
    }
    .track-state.s-rec   { color: var(--red); }
    .track-state.s-armed { color: var(--red); }
    .track-state.s-ready { color: var(--text2); }

    /* ── TIMELINE ── */
    .track-tl {
      height: 36px;
      position: relative;
      margin: 0 24px;
      overflow: hidden;
    }
    .tl-block {
      position: absolute;
      top: 6px;
      height: 24px;
      background: var(--text);
      pointer-events: none;
      transition: opacity 0.1s;
    }
    .tl-block.muted   { background: var(--text3); }
    .tl-block.preview { background: var(--red); opacity: 0.18; width: 100%; }

    /* ── TRACK BUTTONS ── */
    .track-btns { display: flex; border-top: 1px solid var(--border); }
    .tb {
      flex: 1;
      padding: 13px 0;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tb:last-child { border-right: none; }
    .tb:active     { background: var(--bg2); }
    .tb.tb-armed   { color: var(--red); }
    .tb.tb-playing { color: var(--accent); }
    .tb.tb-muted   { color: var(--text3); }
    .tb.tb-off     { color: var(--text3); opacity: 0.45; pointer-events: none; }
    .tb-ico { font-size: 13px; line-height: 1; }

    /* ── SECTION LABEL ── */
    .sec-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 14px 24px 10px;
      border-top: 1px solid var(--border);
    }

    /* ── METRONOME ── */
    .metro-body { padding: 0 24px 16px; }

    .bpm-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .bpm-num {
      font-size: 40px;
      letter-spacing: -0.02em;
      color: var(--text);
      min-width: 76px;
      line-height: 1;
    }
    .bpm-sub {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 2px;
    }
    .beat-pips {
      display: flex;
      gap: 8px;
      flex: 1;
      justify-content: flex-end;
      align-items: center;
    }
    .pip {
      width: 10px;
      height: 10px;
      background: var(--border);
      transition: background 0.04s;
      flex-shrink: 0;
    }
    .pip.lit        { background: var(--text); }
    .pip.lit-accent { background: var(--red); }

    .bpm-ctrl {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .bpm-btn {
      width: 44px;
      height: 44px;
      background: none;
      border: 1px solid var(--border);
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bpm-btn:active { background: var(--bg2); }
    .bpm-btn.tap {
      flex: 1;
      width: auto;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── BARS GRID ── */
    .bars-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }
    .bars-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .bar-opt {
      padding: 10px 0;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
    }
    .bar-opt:last-child { border-right: none; }
    .bar-opt:active     { background: var(--bg2); }
    .bar-opt.selected   { background: var(--text); color: var(--bg); }

    /* ── METRO TOGGLES ── */
    .mt-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--border);
    }
    .mt-btn {
      padding: 11px 0;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, color 0.1s;
    }
    .mt-btn:last-child { border-right: none; }
    .mt-btn:active     { background: var(--bg2); }
    .mt-btn.on         { background: var(--text); color: var(--bg); }

    /* ── TRANSPORT (dark) ── */
    .transport {
      flex-shrink: 0;
      background: #1a1a1a;
      padding-bottom: max(0px, env(safe-area-inset-bottom, 0px));
    }
    .time-row {
      display: flex;
      align-items: baseline;
      padding: 10px 24px 8px;
      gap: 14px;
      border-bottom: 1px solid #2a2a2a;
    }
    .time-counter {
      font-size: 24px;
      letter-spacing: 0.04em;
      color: #ffffff;
      flex: 1;
      font-variant-numeric: tabular-nums;
    }
    .loop-tag {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555555;
    }
    .loop-tag.on { color: var(--accent); }

    .tgrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .tbn {
      padding: 14px 0 11px;
      background: none;
      border: none;
      border-right: 1px solid #2a2a2a;
      font-family: 'Courier New', Courier, monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #666666;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: background 0.1s;
    }
    .tbn:last-child { border-right: none; }
    .tbn:active     { background: #222222; }
    .tbn-g { font-size: 18px; line-height: 1; }

    #tbn-rec.active  { color: var(--red); }
    #tbn-play.active { color: #ffffff; }
    #tbn-loop.active { color: var(--accent); }

    /* ── COUNT-IN OVERLAY ── */
    .count-overlay {
      position: fixed;
      inset: 0;
      background: var(--text);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    .count-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .count-big {
      font-size: 112px;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #ffffff;
    }
    .count-sub {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #444444;
      margin-top: 14px;
    }

    /* ── REC PULSE ── */
    @keyframes rpulse { 0%,100%{opacity:1} 50%{opacity:0.15} }
    .rpulse {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--red);
      animation: rpulse 0.8s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 5px;
    }

    /* ── CALIBRATION ── */
    .cal-row {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      margin-top: 12px;
    }
    .cal-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 12px;
      flex-shrink: 0;
    }
    .cal-offset {
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--text);
      flex: 1;
      text-align: center;
      padding: 0 4px;
    }
    .cal-offset.unset { color: var(--text3); }
    .cal-btn {
      padding: 11px 14px;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .cal-btn:active  { background: var(--bg2); }
    .cal-btn.running { color: var(--red); }

    /* ── ERROR BANNER ── */
    .err-banner {
      padding: 11px 24px;
      background: #fff0f0;
      border-bottom: 1px solid #e8a0a0;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--red);
      display: none;
      flex-shrink: 0;
    }
    .err-banner.on { display: block; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="wordmark">ZWEISPUR</div>
    <div class="app-status" id="app-status">READY</div>
  </div>

  <!-- ERROR -->
  <div class="err-banner" id="err-banner"></div>

  <!-- SCROLL CONTENT -->
  <div class="content">

    <!-- TRACK A -->
    <div class="track-row">
      <div class="track-head">
        <div class="track-id">01</div>
        <div class="track-label">TRACK A</div>
        <div class="track-state" id="ts-0">—</div>
      </div>
      <div class="track-tl" id="tl-0"></div>
      <div class="track-btns">
        <button class="tb" id="tb-arm-0" onclick="toggleArm(0)">
          <span class="tb-ico">●</span><span>ARM</span>
        </button>
        <button class="tb tb-off" id="tb-solo-0" onclick="soloTrack(0)">
          <span class="tb-ico">▶</span><span>SOLO</span>
        </button>
        <button class="tb tb-off" id="tb-mute-0" onclick="toggleMute(0)">
          <span class="tb-ico">◎</span><span>MUTE</span>
        </button>
        <button class="tb tb-off" id="tb-clr-0" onclick="clearTrack(0)">
          <span class="tb-ico">✕</span><span>CLR</span>
        </button>
      </div>
    </div>

    <!-- TRACK B -->
    <div class="track-row">
      <div class="track-head">
        <div class="track-id">02</div>
        <div class="track-label">TRACK B</div>
        <div class="track-state" id="ts-1">—</div>
      </div>
      <div class="track-tl" id="tl-1"></div>
      <div class="track-btns">
        <button class="tb" id="tb-arm-1" onclick="toggleArm(1)">
          <span class="tb-ico">●</span><span>ARM</span>
        </button>
        <button class="tb tb-off" id="tb-solo-1" onclick="soloTrack(1)">
          <span class="tb-ico">▶</span><span>SOLO</span>
        </button>
        <button class="tb tb-off" id="tb-mute-1" onclick="toggleMute(1)">
          <span class="tb-ico">◎</span><span>MUTE</span>
        </button>
        <button class="tb tb-off" id="tb-clr-1" onclick="clearTrack(1)">
          <span class="tb-ico">✕</span><span>CLR</span>
        </button>
      </div>
    </div>

    <!-- METRONOME -->
    <div class="sec-label">METRONOME</div>
    <div class="metro-body">

      <div class="bpm-row">
        <div>
          <div class="bpm-num" id="bpm-val">120</div>
          <div class="bpm-sub">BPM</div>
        </div>
        <div class="beat-pips">
          <div class="pip" id="pip-0"></div>
          <div class="pip" id="pip-1"></div>
          <div class="pip" id="pip-2"></div>
          <div class="pip" id="pip-3"></div>
        </div>
      </div>

      <div class="bpm-ctrl">
        <button class="bpm-btn" onclick="adjBpm(-10)">−10</button>
        <button class="bpm-btn" onclick="adjBpm(-1)">−1</button>
        <button class="bpm-btn tap" id="tap-btn" onclick="tapTempo()">TAP</button>
        <button class="bpm-btn" onclick="adjBpm(1)">+1</button>
        <button class="bpm-btn" onclick="adjBpm(10)">+10</button>
      </div>

      <div class="bars-label">LOOP LENGTH</div>
      <div class="bars-grid">
        <button class="bar-opt selected" data-bars="trk" onclick="setTrackLen()">TRK A</button>
        <button class="bar-opt" data-bars="1" onclick="setBars(1)">1 BAR</button>
        <button class="bar-opt" data-bars="2" onclick="setBars(2)">2 BARS</button>
        <button class="bar-opt" data-bars="4" onclick="setBars(4)">4 BARS</button>
        <button class="bar-opt" data-bars="8" onclick="setBars(8)">8 BARS</button>
      </div>

      <div class="mt-row">
        <button class="mt-btn" id="mt-metro"   onclick="toggleMetro()">◼ METRO</button>
        <button class="mt-btn" id="mt-countin" onclick="toggleCountIn()">↺ COUNT-IN</button>
      </div>

      <div class="cal-row">
        <span class="cal-label">OFFSET</span>
        <span class="cal-offset unset" id="cal-offset-disp">— ms</span>
        <button class="cal-btn" onclick="adjOffset(-5)">−5ms</button>
        <button class="cal-btn" onclick="adjOffset(5)">+5ms</button>
        <button class="cal-btn" id="cal-auto-btn" onclick="calibrate()">AUTO</button>
      </div>

    </div>
  </div><!-- /.content -->

  <!-- TRANSPORT -->
  <div class="transport">
    <div class="time-row">
      <div class="time-counter" id="time-disp">0:00.0</div>
      <div class="loop-tag" id="loop-tag">LOOP OFF</div>
    </div>
    <div class="tgrid">
      <button class="tbn" id="tbn-rec"  onclick="handleRecord()">
        <span class="tbn-g">●</span><span>RECORD</span>
      </button>
      <button class="tbn" id="tbn-play" onclick="handlePlay()">
        <span class="tbn-g">▶</span><span>PLAY</span>
      </button>
      <button class="tbn" id="tbn-stop" onclick="handleStop()">
        <span class="tbn-g">■</span><span>STOP</span>
      </button>
      <button class="tbn" id="tbn-loop" onclick="toggleLoop()">
        <span class="tbn-g">↺</span><span>LOOP</span>
      </button>
    </div>
  </div>

  <!-- COUNT-IN OVERLAY -->
  <div class="count-overlay" id="count-overlay">
    <div class="count-big" id="count-big">4</div>
    <div class="count-sub">COUNT-IN</div>
  </div>

<script>
'use strict';

// ── STATE ────────────────────────────────────────────────────────────────────

let AC = null;
let micStream = null;
let clockRAF = null;

const S = {
  bpm:         120,
  bars:        2,
  useTrackLen: true,    // loop length = Track A duration when true
  loopLen:     4,       // seconds — updated on bpm/bars change
  loopEnabled: false,
  metroOn:     false,
  countInOn:   false,
  isPlaying:   false,
  isRecording: false,
  globalStart: 0,       // AC.currentTime when transport started
  armed:       [false, false],
  tracks: [
    { buf: null, src: null, muted: false, dur: 0 },
    { buf: null, src: null, muted: false, dur: 0 },
  ],
  mr:          null,
  recTrack:    -1,
  recChunks:   [],
  // metronome
  metroTimer:  null,
  nextBeat:    0,
  beatIdx:     0,
  // tap tempo
  taps:           [],
  lastTap:        0,
  // latency compensation
  latencyOffset:  0,      // seconds to trim from overdub recordings
  latencySet:     false,  // whether user has calibrated or nudged
  recHasPlayback: false,  // whether other tracks were playing during last record
  isCalibrating:  false,
};

function calcLoopLen() {
  if (S.useTrackLen && S.tracks[0].buf) return S.tracks[0].dur;
  return (60 / S.bpm) * 4 * S.bars;
}

// ── AUDIO CONTEXT ────────────────────────────────────────────────────────────

async function ensureAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') await AC.resume();
}

async function ensureMic() {
  if (micStream) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: false, autoGainControl: false },
      video: false
    });
  } catch (e) {
    showErr('MICROPHONE ACCESS DENIED');
    throw e;
  }
}

// ── METRONOME ────────────────────────────────────────────────────────────────

const METRO_AHEAD = 0.12;   // seconds to schedule ahead
const METRO_TICK  = 30;     // ms between scheduler polls

function schedClick(t, accent) {
  const osc = AC.createOscillator();
  const g   = AC.createGain();
  osc.connect(g);
  g.connect(AC.destination);
  osc.frequency.value = accent ? 1320 : 880;
  g.gain.setValueAtTime(accent ? 0.5 : 0.28, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.032);
  osc.start(t);
  osc.stop(t + 0.04);
}

function metroTick() {
  while (S.nextBeat < AC.currentTime + METRO_AHEAD) {
    const bi = S.beatIdx % 4;
    schedClick(S.nextBeat, bi === 0);
    const delay = Math.max(0, (S.nextBeat - AC.currentTime) * 1000);
    const cap   = bi;
    setTimeout(() => flashPip(cap), delay);
    S.nextBeat += 60 / S.bpm;
    S.beatIdx++;
  }
}

function startMetro(atTime) {
  stopMetro();
  S.beatIdx  = 0;
  S.nextBeat = atTime != null ? atTime : AC.currentTime;
  S.metroTimer = setInterval(metroTick, METRO_TICK);
  metroTick();
}

function stopMetro() {
  if (S.metroTimer) { clearInterval(S.metroTimer); S.metroTimer = null; }
  document.querySelectorAll('.pip').forEach(p => { p.className = 'pip'; });
}

function flashPip(bi) {
  document.querySelectorAll('.pip').forEach((p, i) => {
    p.className = 'pip' + (i === bi ? (bi === 0 ? ' lit-accent' : ' lit') : '');
  });
  setTimeout(() => {
    const p = document.getElementById('pip-' + bi);
    if (p) p.className = 'pip';
  }, 90);
}

// ── RECORDING ────────────────────────────────────────────────────────────────

function getMime() {
  if (typeof MediaRecorder === 'undefined') return null;
  for (const t of ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus']) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function startRec(idx) {
  await ensureMic();
  const mime = getMime();
  if (mime === null) { showErr('MEDIARECORDER NOT SUPPORTED — USE SAFARI 14.3+'); return; }

  const mr = new MediaRecorder(micStream, mime ? { mimeType: mime } : {});
  S.recChunks = [];
  S.mr        = mr;
  S.recTrack  = idx;

  mr.ondataavailable = e => { if (e.data.size > 0) S.recChunks.push(e.data); };

  mr.onstop = async () => {
    try {
      const blob = new Blob(S.recChunks, { type: mime || 'audio/webm' });
      const ab   = await blob.arrayBuffer();
      let   buf  = await new Promise((res, rej) => AC.decodeAudioData(ab, res, rej));
      // Apply latency compensation for overdub recordings
      if (S.recHasPlayback && S.latencyOffset > 0) {
        buf = trimBuffer(buf, S.latencyOffset);
      }
      S.tracks[idx].buf = buf;
      S.tracks[idx].dur = buf.duration;
      if (S.useTrackLen && idx === 0) S.loopLen = buf.duration;
      refreshTrack(idx);
      setStatus('TRACK ' + (idx === 0 ? 'A' : 'B') + ' READY');
    } catch (e) {
      showErr('DECODE ERROR');
      console.warn(e);
    }
  };

  mr.start(100);
  refreshTrack(idx, 'rec');
}

function stopRec() {
  if (S.mr && S.mr.state !== 'inactive') S.mr.stop();
  S.mr          = null;
  S.recTrack    = -1;
  S.isRecording = false;
}

// ── LATENCY COMPENSATION ─────────────────────────────────────────────────────

function trimBuffer(buf, trimSecs) {
  const sr         = buf.sampleRate;
  const trimSamps  = Math.min(Math.floor(trimSecs * sr), buf.length - 1);
  if (trimSamps <= 0) return buf;
  const newLen = buf.length - trimSamps;
  const out    = AC.createBuffer(buf.numberOfChannels, newLen, sr);
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    out.getChannelData(ch).set(buf.getChannelData(ch).subarray(trimSamps));
  }
  return out;
}

async function calibrate() {
  if (S.isCalibrating) return;
  S.isCalibrating = true;
  const btn = document.getElementById('cal-auto-btn');
  btn.classList.add('running');
  btn.textContent = '...';
  setStatus('CALIBRATING');

  try {
    await ensureAC();
    await ensureMic();

    const mime   = getMime();
    if (mime === null) { showErr('MEDIARECORDER NOT SUPPORTED'); return; }

    const mr     = new MediaRecorder(micStream, mime ? { mimeType: mime } : {});
    const chunks = [];
    mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    // Note AC time right before starting recorder — this is t=0 of the recording
    const recStartAcTime = AC.currentTime;
    mr.start(50);

    // Wait for MediaRecorder to stabilise, then fire a click
    await sleep(350);
    const clickAcTime = AC.currentTime + 0.08;
    schedClick(clickAcTime, true);
    schedClick(clickAcTime, true); // double-tap for stronger peak on speaker

    // Record for another 1.2s to capture the click
    await sleep(1300);
    mr.stop();

    // Decode and find peak
    const buf = await new Promise((res, rej) => {
      mr.onstop = async () => {
        try {
          const blob = new Blob(chunks, { type: mime || 'audio/webm' });
          const ab   = await blob.arrayBuffer();
          res(await new Promise((r, j) => AC.decodeAudioData(ab, r, j)));
        } catch (e) { rej(e); }
      };
    });

    const data         = buf.getChannelData(0);
    const sr           = buf.sampleRate;
    // Expected sample position of the click in the recording
    const expectedSamp = Math.max(0, Math.floor((clickAcTime - recStartAcTime) * sr));
    // Search ±600ms around expected
    const searchStart  = Math.max(0,          expectedSamp - Math.floor(0.6 * sr));
    const searchEnd    = Math.min(data.length, expectedSamp + Math.floor(0.6 * sr));

    let maxVal = 0, peakSamp = expectedSamp;
    for (let i = searchStart; i < searchEnd; i++) {
      const a = Math.abs(data[i]);
      if (a > maxVal) { maxVal = a; peakSamp = i; }
    }

    const measuredOffset = (peakSamp - expectedSamp) / sr;

    if (maxVal < 0.03) {
      showErr('NO SIGNAL — RAISE VOLUME & RETRY');
    } else if (measuredOffset < 0 || measuredOffset > 0.8) {
      showErr('CAL RANGE ERROR — RETRY');
    } else {
      S.latencyOffset = measuredOffset;
      S.latencySet    = true;
      updateOffsetDisp();
      setStatus('OFFSET: ' + Math.round(S.latencyOffset * 1000) + 'MS');
    }
  } catch (e) {
    console.warn('calibrate:', e);
    showErr('CAL ERROR');
  }

  btn.classList.remove('running');
  btn.textContent = 'AUTO';
  S.isCalibrating = false;
}

function adjOffset(ms) {
  S.latencyOffset = Math.max(0, S.latencyOffset + ms / 1000);
  S.latencySet    = true;
  updateOffsetDisp();
}

function updateOffsetDisp() {
  const el = document.getElementById('cal-offset-disp');
  if (!S.latencySet) {
    el.textContent = '— ms';
    el.classList.add('unset');
  } else {
    el.textContent = Math.round(S.latencyOffset * 1000) + ' ms';
    el.classList.remove('unset');
  }
}

// ── PLAYBACK ─────────────────────────────────────────────────────────────────

function playTrack(idx, atAcTime, offset) {
  const t = S.tracks[idx];
  if (!t.buf || t.muted) return;
  killTrack(idx);

  const src = AC.createBufferSource();
  src.buffer = t.buf;
  src.connect(AC.destination);

  if (S.loopEnabled) {
    src.loop      = true;
    src.loopStart = 0;
    src.loopEnd   = Math.min(t.buf.duration, S.loopLen);
  }

  src.start(atAcTime, offset || 0);
  t.src = src;

  src.onended = () => {
    if (t.src === src) { t.src = null; refreshTrack(idx); }
  };
}

function killTrack(idx) {
  const t = S.tracks[idx];
  if (t.src) { try { t.src.stop(); } catch(_) {} t.src = null; }
}

function killAll() {
  S.tracks.forEach((_, i) => killTrack(i));
}

// ── COUNT-IN ─────────────────────────────────────────────────────────────────

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function doCountIn() {
  const overlay = document.getElementById('count-overlay');
  const bigEl   = document.getElementById('count-big');
  overlay.classList.add('visible');

  const beat = 60 / S.bpm;
  const t0   = AC.currentTime + 0.05;

  for (let i = 0; i < 4; i++) schedClick(t0 + i * beat, i === 0);

  for (let n = 4; n >= 1; n--) {
    bigEl.textContent = n;
    await sleep(beat * 1000);
  }

  overlay.classList.remove('visible');
}

// ── TRANSPORT ────────────────────────────────────────────────────────────────

async function handleRecord() {
  try {
    await ensureAC();

    // Determine track to record
    let idx = S.armed.findIndex(a => a);
    if (idx === -1) {
      idx = S.tracks.findIndex(t => !t.buf);
      if (idx === -1) { setStatus('CLR A TRACK FIRST'); return; }
      S.armed[idx] = true;
      refreshTrack(idx);
    }

    S.loopLen = calcLoopLen();

    if (S.countInOn) await doCountIn();

    const now       = AC.currentTime;
    S.globalStart   = now;
    S.isPlaying     = true;
    S.isRecording   = true;

    // Play back other track in loop
    S.recHasPlayback = S.tracks.some((tr, i) => i !== idx && tr.buf);
    S.tracks.forEach((tr, i) => {
      if (i !== idx && tr.buf) playTrack(i, now, 0);
    });

    if (S.metroOn) startMetro(now);

    await startRec(idx);
    refreshTransport();
    startClock();
  } catch (e) {
    console.warn('record:', e);
    S.isRecording = false;
    refreshTransport();
  }
}

async function handlePlay() {
  if (S.isPlaying) return;
  try {
    await ensureAC();
    S.loopLen     = calcLoopLen();
    S.globalStart = AC.currentTime;
    S.isPlaying   = true;

    S.tracks.forEach((tr, i) => { if (tr.buf) playTrack(i, AC.currentTime, 0); });
    if (S.metroOn) startMetro(AC.currentTime);

    refreshTransport();
    startClock();
  } catch (e) { console.warn('play:', e); }
}

function handleStop() {
  stopRec();
  killAll();
  stopMetro();
  stopClock();
  S.isPlaying   = false;
  S.isRecording = false;
  refreshTransport();
  S.tracks.forEach((_, i) => refreshTrack(i));
  setStatus('STOPPED');
}

function toggleLoop() {
  S.loopEnabled = !S.loopEnabled;
  document.getElementById('tbn-loop').classList.toggle('active', S.loopEnabled);
  const tag = document.getElementById('loop-tag');
  tag.textContent = S.loopEnabled ? 'LOOP ON' : 'LOOP OFF';
  tag.classList.toggle('on', S.loopEnabled);
}

// ── CLOCK ────────────────────────────────────────────────────────────────────

function startClock() {
  stopClock();
  function tick() {
    if (!AC) return;
    let pos = AC.currentTime - S.globalStart;
    if (pos < 0) pos = 0;
    if (S.loopEnabled && S.loopLen > 0) pos = pos % S.loopLen;
    const m = Math.floor(pos / 60);
    const s = (pos % 60).toFixed(1).padStart(4, '0');
    document.getElementById('time-disp').textContent = m + ':' + s;
    clockRAF = requestAnimationFrame(tick);
  }
  clockRAF = requestAnimationFrame(tick);
}

function stopClock() {
  if (clockRAF) { cancelAnimationFrame(clockRAF); clockRAF = null; }
  document.getElementById('time-disp').textContent = '0:00.0';
}

// ── TRACK CONTROLS ───────────────────────────────────────────────────────────

function toggleArm(idx) {
  S.armed[idx] = !S.armed[idx];
  if (S.armed[idx]) {
    // only one armed at a time
    S.armed[1 - idx] = false;
    refreshTrack(1 - idx);
  }
  refreshTrack(idx);
}

function soloTrack(idx) {
  const t = S.tracks[idx];
  if (!t.buf) return;
  ensureAC().then(() => {
    if (t.src) { killTrack(idx); }
    else        { playTrack(idx, AC.currentTime, 0); }
    refreshTrack(idx);
  });
}

function toggleMute(idx) {
  const t = S.tracks[idx];
  if (!t.buf) return;
  t.muted = !t.muted;
  if (t.muted) {
    killTrack(idx);
  } else if (S.isPlaying) {
    playTrack(idx, AC.currentTime, 0);
  }
  refreshTrack(idx);
}

function clearTrack(idx) {
  killTrack(idx);
  const t = S.tracks[idx];
  t.buf = null; t.dur = 0; t.muted = false; t.src = null;
  S.armed[idx] = false;
  document.getElementById('tl-' + idx).innerHTML = '';
  refreshTrack(idx);
  setStatus('TRACK ' + (idx === 0 ? 'A' : 'B') + ' CLEARED');
}

// ── BPM / BARS ───────────────────────────────────────────────────────────────

function adjBpm(d) {
  S.bpm = Math.max(40, Math.min(240, S.bpm + d));
  document.getElementById('bpm-val').textContent = S.bpm;
  S.loopLen = calcLoopLen();
}

function tapTempo() {
  const now = Date.now();
  if (now - S.lastTap > 2500) S.taps = [];
  S.taps.push(now);
  S.lastTap = now;
  if (S.taps.length > 1) {
    const diffs = [];
    for (let i = 1; i < S.taps.length; i++) diffs.push(S.taps[i] - S.taps[i - 1]);
    const avg = diffs.reduce((a, b) => a + b, 0) / diffs.length;
    S.bpm = Math.max(40, Math.min(240, Math.round(60000 / avg)));
    document.getElementById('bpm-val').textContent = S.bpm;
    S.loopLen = calcLoopLen();
  }
  if (S.taps.length > 8) S.taps.shift();
}

function setTrackLen() {
  S.useTrackLen = true;
  S.loopLen = calcLoopLen();
  document.querySelectorAll('.bar-opt').forEach(b => {
    b.classList.toggle('selected', b.dataset.bars === 'trk');
  });
}

function setBars(n) {
  S.useTrackLen = false;
  S.bars        = n;
  S.loopLen     = calcLoopLen();
  document.querySelectorAll('.bar-opt').forEach(b => {
    b.classList.toggle('selected', +b.dataset.bars === n);
  });
}

function toggleMetro() {
  S.metroOn = !S.metroOn;
  const btn = document.getElementById('mt-metro');
  btn.classList.toggle('on', S.metroOn);
  btn.textContent = S.metroOn ? '▶ METRO' : '◼ METRO';
  if (S.metroOn) {
    ensureAC().then(() => startMetro());
  } else {
    stopMetro();
  }
}

function toggleCountIn() {
  S.countInOn = !S.countInOn;
  const btn = document.getElementById('mt-countin');
  btn.classList.toggle('on', S.countInOn);
  btn.textContent = S.countInOn ? '↺ COUNT: ON' : '↺ COUNT-IN';
}

// ── UI REFRESH ───────────────────────────────────────────────────────────────

function refreshTrack(idx, override) {
  const t       = S.tracks[idx];
  const armed   = S.armed[idx];
  const isRecTk = S.isRecording && S.recTrack === idx;

  const tsEl    = document.getElementById('ts-' + idx);
  const armBtn  = document.getElementById('tb-arm-' + idx);
  const soloBtn = document.getElementById('tb-solo-' + idx);
  const muteBtn = document.getElementById('tb-mute-' + idx);
  const clrBtn  = document.getElementById('tb-clr-' + idx);
  const tlEl    = document.getElementById('tl-' + idx);

  // State label
  if (override === 'rec' || isRecTk) {
    tsEl.innerHTML  = '<span class="rpulse"></span>REC';
    tsEl.className  = 'track-state s-rec';
  } else if (armed) {
    tsEl.textContent = 'ARMED';
    tsEl.className   = 'track-state s-armed';
  } else if (t.buf) {
    tsEl.textContent = t.muted ? 'MUTED' : (t.src ? 'PLAY' : 'READY');
    tsEl.className   = 'track-state s-ready';
  } else {
    tsEl.textContent = '—';
    tsEl.className   = 'track-state';
  }

  // Arm button highlight
  armBtn.classList.toggle('tb-armed', armed);

  // Audio-dependent buttons
  const has = !!t.buf;
  [soloBtn, muteBtn, clrBtn].forEach(b => b.classList.toggle('tb-off', !has));
  if (has) {
    soloBtn.classList.toggle('tb-playing', !!t.src && !t.muted);
    muteBtn.classList.toggle('tb-muted', t.muted);
  }

  // Timeline block
  if (has) {
    const ll  = S.loopLen > 0 ? S.loopLen : calcLoopLen();
    const pct = Math.min(100, (t.dur / ll) * 100).toFixed(2);
    let blk   = tlEl.querySelector('.tl-block:not(.preview)');
    if (!blk) {
      blk = document.createElement('div');
      blk.className = 'tl-block';
      tlEl.appendChild(blk);
    }
    blk.style.left  = '0px';
    blk.style.width = pct + '%';
    blk.classList.toggle('muted', t.muted);
  }

  // Armed preview ghost (when armed, no audio yet)
  const preview = tlEl.querySelector('.tl-block.preview');
  if (armed && !has) {
    if (!preview) {
      const g = document.createElement('div');
      g.className = 'tl-block preview';
      tlEl.appendChild(g);
    }
  } else if (preview) {
    preview.remove();
  }
}

function refreshTransport() {
  document.getElementById('tbn-rec').classList.toggle('active', S.isRecording);
  document.getElementById('tbn-play').classList.toggle('active', S.isPlaying && !S.isRecording);
}

function setStatus(msg) {
  document.getElementById('app-status').textContent = msg;
}

function showErr(msg) {
  const el = document.getElementById('err-banner');
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 4000);
}

// ── INIT ─────────────────────────────────────────────────────────────────────

S.loopLen = calcLoopLen();

if (!window.AudioContext && !window.webkitAudioContext) {
  showErr('WEB AUDIO NOT SUPPORTED — USE SAFARI 14.3+');
}
</script>
