<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>ZWEISPUR</title>
  <style>
    :root {
      --bg:     #ffffff;
      --bg2:    #f5f5f5;
      --text:   #111111;
      --text2:  #666666;
      --text3:  #bbbbbb;
      --red:    #b5291c;
      --border: #e0e0e0;
      --accent: #1db954;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.4;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-col {
      width: 100%;
      max-width: 640px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── TOP BAR ── */
    .top-bar {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding: 16px 24px 14px;
      padding-top: max(16px, calc(env(safe-area-inset-top, 0px) + 10px));
      display: flex;
      align-items: center;
    }
    .wordmark {
      flex: 1;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }
    .app-status {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .view-btn {
      background: none;
      border: 1px solid var(--border);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text2);
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      margin-right: 12px;
    }
    .view-btn:active { background: var(--bg2); }
    .view-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── SCROLL CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ── TRACKS ── */
    .track-row { border-bottom: 1px solid var(--border); }

    .track-head {
      display: flex;
      align-items: center;
      padding: 13px 24px 11px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .track-id {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text3);
      width: 20px;
    }
    .track-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text2);
      flex: 1;
    }
    .track-state {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      min-width: 52px;
      text-align: right;
    }
    .track-state.s-rec   { color: var(--red); }
    .track-state.s-armed { color: var(--red); }
    .track-state.s-ready { color: var(--text2); }

    /* ── TIMELINE ── */
    .track-tl {
      height: 36px;
      position: relative;
      margin: 0 24px;
      overflow: hidden;
    }
    .tl-block {
      position: absolute;
      top: 6px;
      height: 24px;
      background: var(--text);
      pointer-events: none;
      transition: opacity 0.1s;
    }
    .tl-block.muted   { background: var(--text3); }
    .tl-block.preview { background: var(--red); opacity: 0.18; width: 100%; }

    /* ── TRACK BUTTONS ── */
    .track-btns { display: flex; border-top: 1px solid var(--border); }
    .tb {
      flex: 1;
      padding: 13px 0;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tb:last-child { border-right: none; }
    .tb:active     { background: var(--bg2); }
    .tb.tb-armed   { color: var(--red); }
    .tb.tb-playing { color: var(--accent); }
    .tb.tb-muted   { color: var(--text3); }
    .tb.tb-off     { color: var(--text3); opacity: 0.45; pointer-events: none; }
    .tb-ico { font-size: 13px; line-height: 1; }

    /* ── SECTION LABEL ── */
    .sec-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text2);
      padding: 14px 24px 10px 21px;
      border-top: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    /* ── METRONOME ── */
    .metro-body { padding: 0 24px 16px; }
    .bpm-controls { overflow: hidden; transition: max-height 0.2s ease, opacity 0.2s ease; max-height: 200px; opacity: 1; }
    .bpm-controls.hidden { max-height: 0; opacity: 0; pointer-events: none; }

    .bpm-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .bpm-num {
      font-size: 40px;
      letter-spacing: -0.02em;
      color: var(--text);
      min-width: 76px;
      line-height: 1;
    }
    .bpm-sub {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 2px;
    }
    .beat-pips {
      display: flex;
      gap: 8px;
      flex: 1;
      justify-content: flex-end;
      align-items: center;
    }
    .pip {
      width: 10px;
      height: 10px;
      background: var(--border);
      transition: background 0.04s;
      flex-shrink: 0;
    }
    .pip.lit        { background: var(--text); }
    .pip.lit-accent { background: var(--red); }

    .bpm-ctrl {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .bpm-btn {
      width: 44px;
      height: 44px;
      background: none;
      border: 1px solid var(--border);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bpm-btn:active { background: var(--bg2); }
    .bpm-btn.tap {
      flex: 1;
      width: auto;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── BARS GRID ── */
    .bars-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }
    .bars-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .bar-opt {
      padding: 10px 0;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
    }
    .bar-opt:last-child { border-right: none; }
    .bar-opt:active     { background: var(--bg2); }
    .bar-opt.selected   { background: var(--text); color: var(--bg); }

    /* ── METRO TOGGLES ── */
    .mt-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
    }
    .mt-btn {
      padding: 11px 0;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, color 0.1s;
    }
    .mt-btn:last-child { border-right: none; }
    .mt-btn:active     { background: var(--bg2); }
    .mt-btn.on         { background: var(--text); color: var(--bg); }

    /* ── TRANSPORT (dark) ── */
    .transport {
      flex-shrink: 0;
      background: #1a1a1a;
      padding-bottom: max(0px, env(safe-area-inset-bottom, 0px));
    }
    .time-row {
      display: flex;
      align-items: baseline;
      padding: 10px 24px 8px;
      gap: 14px;
      border-bottom: 1px solid #2a2a2a;
    }
    .time-counter {
      font-size: 24px;
      letter-spacing: 0.04em;
      color: #ffffff;
      flex: 1;
      font-variant-numeric: tabular-nums;
    }
    .loop-tag {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555555;
    }
    .loop-tag.on { color: var(--accent); }

    .tgrid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
    }
    .tbn {
      padding: 14px 0 11px;
      background: none;
      border: none;
      border-right: 1px solid #2a2a2a;
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #666666;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: background 0.1s;
    }
    .tbn:last-child { border-right: none; }
    .tbn:active     { background: #222222; }
    .tbn-g { font-size: 18px; line-height: 1; }

    #tbn-rec.active   { color: var(--red); }
    #tbn-play.active  { color: #ffffff; }
    #tbn-loop.active  { color: var(--accent); }
    #tbn-share.off    { opacity: 0.3; pointer-events: none; }

    /* ── COUNT-IN OVERLAY ── */
    .count-overlay {
      position: fixed;
      inset: 0;
      background: var(--text);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    .count-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .count-big {
      font-size: 112px;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #ffffff;
    }
    .count-sub {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #444444;
      margin-top: 14px;
    }

    /* ── FILENAME MODAL ── */
    .fname-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 400;
      display: none;
      align-items: flex-end;
    }
    .fname-backdrop.visible { display: flex; }
    .fname-panel {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 0 0 calc(env(safe-area-inset-bottom, 0px) + 8px);
    }
    .fname-heading {
      padding: 14px 24px 12px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
    }
    .fname-body {
      padding: 18px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    .fname-ext {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-top: 6px;
    }
    .fname-input {
      width: 100%;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 16px;
      letter-spacing: 0.04em;
      outline: none;
      -webkit-appearance: none;
    }
    .fname-input:focus { border-bottom-color: var(--text); }
    .fname-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .fname-action {
      padding: 16px 0;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.1s;
    }
    .fname-action:last-child { border-right: none; }
    .fname-action:active     { background: var(--bg2); }
    .fname-action.confirm    { color: var(--text); }

    /* ── REC PULSE ── */
    @keyframes rpulse { 0%,100%{opacity:1} 50%{opacity:0.15} }
    .rpulse {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--red);
      animation: rpulse 0.8s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 5px;
    }

    /* ── CALIBRATION ── */
    .cal-row {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      margin-top: 12px;
    }
    .cal-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 12px;
      flex-shrink: 0;
    }
    .cal-offset {
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--text);
      flex: 1;
      text-align: center;
      padding: 0 4px;
    }
    .cal-offset.unset { color: var(--text3); }
    .cal-btn {
      padding: 11px 14px;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .cal-btn:active  { background: var(--bg2); }
    .cal-btn.running { color: var(--red); }

    /* ── MIXER / CONSOLE VIEW ── */
    .mixer-view {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: none;
      flex-direction: column;
    }
    .mixer-view.visible { display: flex; }

    /* Two-column console desk */
    .mix-desk {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      border-top: 1px solid var(--border);
    }
    .mix-ch {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px 20px;
      gap: 10px;
      border-right: 1px solid var(--border);
    }
    .mix-ch:last-child { border-right: none; }

    /* Channel label strip */
    .mix-ch-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 100%;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .mix-ch-num {
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--text3);
      text-transform: uppercase;
    }
    .mix-ch-name {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--text2);
      text-transform: uppercase;
    }

    /* dB readout */
    .mix-db {
      font-size: 15px;
      letter-spacing: 0.03em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .mix-db.silent { color: var(--text3); }

    /* ── VERTICAL FADER ──
       Technique: rotate a normal horizontal range -90deg inside a fixed wrapper.
       Wrapper width = thumb area (44px), wrapper height = visual fader throw (172px).
       Input width pre-rotation = 172px (= visual height), height = 44px (= visual width).
       Offset math: top = (172-44)/2 = 64px, left = (44-172)/2 = -64px             */
    .vfader-wrap {
      position: relative;
      width: 44px;
      height: 172px;
      flex-shrink: 0;
    }
    .vfader {
      position: absolute;
      -webkit-appearance: none;
      appearance: none;
      width: 172px;
      height: 44px;
      top: 64px;
      left: -64px;
      transform: rotate(-90deg);
      transform-origin: center center;
      outline: none;
      cursor: pointer;
      border-radius: 0;
      background: linear-gradient(
        to right,
        var(--text)   0%,
        var(--text)   calc(var(--fill, 100%) * 1%),
        var(--border) calc(var(--fill, 100%) * 1%),
        var(--border) 100%
      );
    }
    .vfader::-webkit-slider-thumb  { -webkit-appearance: none; width: 0; height: 0; background: transparent; border: none; }
    .vfader::-moz-range-thumb      { width: 0; height: 0; background: transparent; border: none; }
    .vfader::-webkit-slider-runnable-track { height: 2px; }
    .vfader::-moz-range-track              { height: 2px; }

    /* ── PAN CONTROL ── */
    .pan-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .pan-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .pan-val {
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--text);
      min-height: 18px;
    }
    .pan-dial {
      display: block;
      width: 60px;
      height: 60px;
      cursor: ns-resize;
      touch-action: none;
    }

    /* ── RESPONSIVE ── */

    /* iPad portrait and up (≥ 600px) */
    @media (min-width: 600px) {
      .app-col {
        border-left:  1px solid var(--border);
        border-right: 1px solid var(--border);
      }

      .top-bar {
        padding: 20px 32px 16px;
        padding-top: max(20px, calc(env(safe-area-inset-top, 0px) + 12px));
      }

      .track-head   { padding: 16px 32px 14px; }
      .track-tl     { height: 44px; margin: 0 32px; }
      .tl-block:not(.preview) { top: 8px; height: 28px; }
      .track-btns .tb { padding: 16px 0; font-size: 11px; }
      .track-btns .tb-ico { font-size: 15px; }

      .sec-label    { padding: 18px 32px 12px 29px; }
      .metro-body   { padding: 0 32px 20px; }
      .bpm-num      { font-size: 52px; min-width: 90px; }
      .bpm-btn      { width: 52px; height: 52px; font-size: 12px; }
      .bpm-ctrl     { gap: 10px; margin-bottom: 16px; }
      .mt-btn       { padding: 14px 0; font-size: 11px; }
      .cal-btn      { padding: 13px 16px; }
      .bars-label   { font-size: 11px; }
      .bar-opt      { padding: 12px 0; font-size: 11px; }

      .time-row     { padding: 14px 32px 12px; }
      .time-counter { font-size: 30px; }
      .tbn          { padding: 18px 0 14px; font-size: 10px; letter-spacing: 0.16em; }
      .tbn-g        { font-size: 22px; }

      /* Taller fader on tablet
         Wrapper 52×220, input 220×52, offset: top=(220-52)/2=84, left=(52-220)/2=-84 */
      .vfader-wrap  { width: 52px; height: 220px; }
      .vfader       { width: 220px; height: 52px; top: 84px; left: -84px; }
      .vfader::-webkit-slider-runnable-track { height: 2px; }
      .vfader::-moz-range-track              { height: 2px; }

      .pan-dial    { width: 72px; height: 72px; }
      .mix-ch      { padding: 24px 20px 28px; gap: 14px; }
      .mix-ch-name { font-size: 12px; }
      .mix-db      { font-size: 17px; }
    }

    /* iPad landscape / desktop (≥ 900px) */
    @media (min-width: 900px) {
      html, body { font-size: 15px; cursor: default; }

      .track-btns .tb { padding: 18px 0; }
      .tbn            { padding: 20px 0 16px; }
      .tbn-g          { font-size: 24px; }
      .time-counter   { font-size: 34px; }

      /* Even taller fader on desktop
         Wrapper 52×260, input 260×52, offset: top=(260-52)/2=104, left=(52-260)/2=-104 */
      .vfader-wrap  { width: 52px; height: 260px; }
      .vfader       { width: 260px; height: 52px; top: 104px; left: -104px; }

      .pan-dial { width: 80px; height: 80px; }
    }

    /* ── ERROR BANNER ── */
    .err-banner {
      padding: 11px 24px;
      background: #fff0f0;
      border-bottom: 1px solid #e8a0a0;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--red);
      display: none;
      flex-shrink: 0;
    }
    .err-banner.on { display: block; }
  </style>
</head>
<body>

  <div class="app-col">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="wordmark">ZWEISPUR</div>
    <button class="view-btn" id="view-btn" onclick="toggleView()">MIX</button>
    <div class="app-status" id="app-status">READY</div>
  </div>

  <!-- ERROR -->

<script>
'use strict';

// ── STATE ────────────────────────────────────────────────────────────────────

let AC = null;
let micStream = null;
let clockRAF = null;

const S = {
  bpm:         120,
  bars:        2,
  useTrackLen: true,    // loop length = Track A duration when true
  loopLen:     4,       // seconds — updated on bpm/bars change
  loopEnabled: false,
  metroOn:     false,
  countInOn:   false,
  isPlaying:   false,
  isRecording: false,
  globalStart: 0,       // AC.currentTime when transport started
  armed:       [false, false],
  speedMode: null,   // null | 'half' | 'three4'
  tracks: [
    { buf: null, origBuf: null, src: null, gainNode: null, panNode: null, muted: false, dur: 0, vol: 1.0, pan: 0 },
    { buf: null, origBuf: null, src: null, gainNode: null, panNode: null, muted: false, dur: 0, vol: 1.0, pan: 0 },
  ],
  mr:          null,
  recTrack:    -1,
  recChunks:   [],
  // metronome
  metroTimer:  null,
  nextBeat:    0,
  beatIdx:     0,
  // tap tempo
  taps:           [],
  lastTap:        0,
  // latency compensation
  latencyOffset:  0.077,  // seconds to trim from overdub recordings
  latencySet:     true,   // whether user has calibrated or nudged
  recHasPlayback: false,  // whether other tracks were playing during last record
  isCalibrating:  false,
};

function calcLoopLen() {
  if (S.useTrackLen && S.tracks[0].buf) return S.tracks[0].dur;
  return (60 / S.bpm) * 4 * S.bars;
}

// ── AUDIO CONTEXT ────────────────────────────────────────────────────────────

async function ensureAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') await AC.resume();
}

async function ensureMic() {
  if (micStream) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,   // off: EC is for calls, destroys recording quality
        noiseSuppression: false,   // off: smears transients and tonal content
        autoGainControl:  false,   // off: causes pumping artifacts
        sampleRate:       { ideal: 48000 },  // iPhone native rate
        channelCount:     { ideal: 1 },      // mic is mono; no need for stereo stream
      },
      video: false
    });
  } catch (e) {
    showErr('MICROPHONE ACCESS DENIED');
    throw e;
  }
}

// ── METRONOME ────────────────────────────────────────────────────────────────

const METRO_AHEAD = 0.12;   // seconds to schedule ahead
const METRO_TICK  = 30;     // ms between scheduler polls

function schedClick(t, accent) {
  const osc = AC.createOscillator();
  const g   = AC.createGain();
  osc.connect(g);
  g.connect(AC.destination);
  osc.frequency.value = accent ? 1320 : 880;
  g.gain.setValueAtTime(accent ? 0.5 : 0.28, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.032);
  osc.start(t);
  osc.stop(t + 0.04);
}

function metroTick() {
  while (S.nextBeat < AC.currentTime + METRO_AHEAD) {
    const bi = S.beatIdx % 4;
    schedClick(S.nextBeat, bi === 0);
    const delay = Math.max(0, (S.nextBeat - AC.currentTime) * 1000);
    const cap   = bi;
    setTimeout(() => flashPip(cap), delay);
    S.nextBeat += 60 / S.bpm;
    S.beatIdx++;
  }
}

function startMetro(atTime) {
  stopMetro();
  S.beatIdx  = 0;
  S.nextBeat = atTime != null ? atTime : AC.currentTime;
  S.metroTimer = setInterval(metroTick, METRO_TICK);
  metroTick();
}

function stopMetro() {
  if (S.metroTimer) { clearInterval(S.metroTimer); S.metroTimer = null; }
  document.querySelectorAll('.pip').forEach(p => { p.className = 'pip'; });
}

function flashPip(bi) {
  document.querySelectorAll('.pip').forEach((p, i) => {
    p.className = 'pip' + (i === bi ? (bi === 0 ? ' lit-accent' : ' lit') : '');
  });
  setTimeout(() => {
    const p = document.getElementById('pip-' + bi);
    if (p) p.className = 'pip';
  }, 90);
}

// ── RECORDING ────────────────────────────────────────────────────────────────

function getMime() {
  if (typeof MediaRecorder === 'undefined') return null;
  for (const t of ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus']) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function startRec(idx) {
  await ensureMic();
  const mime = getMime();
  if (mime === null) { showErr('MEDIARECORDER NOT SUPPORTED — USE SAFARI 14.3+'); return; }

  const mr = new MediaRecorder(micStream, {
    ...(mime ? { mimeType: mime } : {}),
    audioBitsPerSecond: 256000,   // 256kbps AAC — far above Safari's ~32kbps default
  });
  S.recChunks = [];
  S.mr        = mr;
  S.recTrack  = idx;

  mr.ondataavailable = e => { if (e.data.size > 0) S.recChunks.push(e.data); };

  mr.onstop = async () => {
    try {
      const blob = new Blob(S.recChunks, { type: mime || 'audio/webm' });
      const ab   = await blob.arrayBuffer();
      let   buf  = await new Promise((res, rej) => AC.decodeAudioData(ab, res, rej));
      // Apply latency compensation for overdub recordings
      if (S.recHasPlayback && S.latencyOffset > 0) {
        buf = trimBuffer(buf, S.latencyOffset);
      }
      if (S.speedMode === 'half') {
        S.tracks[idx].origBuf = buf;
        buf = timeStretch(buf, 2.0);
      } else if (S.speedMode === 'three4') {
        S.tracks[idx].origBuf = buf;
        buf = timeStretch(buf, 4 / 3);
      }
      S.tracks[idx].buf = buf;
      S.tracks[idx].dur = buf.duration;
      if (S.useTrackLen && idx === 0) S.loopLen = buf.duration;
      refreshTrack(idx);
      setStatus('TRACK ' + (idx === 0 ? 'A' : 'B') + ' READY');
    } catch (e) {
      showErr('DECODE ERROR');
      console.warn(e);
    }
  };

  mr.start(100);
  refreshTrack(idx, 'rec');
}

function stopRec() {
  if (S.mr && S.mr.state !== 'inactive') S.mr.stop();
  S.mr          = null;
  S.recTrack    = -1;
  S.isRecording = false;
}

// ── PHASE VOCODER TIME STRETCH ────────────────────────────────────────────────
// Replaces basic OLA. FFT-based phase accumulation maintains bin phase
// coherence between frames, eliminating the metallic/phasey OLA artifacts.

function pvFFT(re, im, forward) {
  const N = re.length;
  // Bit-reversal permutation
  for (let i = 1, j = 0; i < N; i++) {
    let bit = N >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
          t = im[i]; im[i] = im[j]; im[j] = t;
    }
  }
  // Cooley-Tukey butterfly
  for (let len = 2; len <= N; len <<= 1) {
    const ang = (forward ? -1 : 1) * 2 * Math.PI / len;
    const wR = Math.cos(ang), wI = Math.sin(ang);
    for (let i = 0; i < N; i += len) {
      let tR = 1, tI = 0;
      for (let j = 0; j < (len >> 1); j++) {
        const uR = re[i+j],           uI = im[i+j];
        const vR = re[i+j+(len>>1)]*tR - im[i+j+(len>>1)]*tI;
        const vI = re[i+j+(len>>1)]*tI + im[i+j+(len>>1)]*tR;
        re[i+j]          = uR+vR;  im[i+j]          = uI+vI;
        re[i+j+(len>>1)] = uR-vR;  im[i+j+(len>>1)] = uI-vI;
        const nr = tR*wR - tI*wI; tI = tR*wI + tI*wR; tR = nr;
      }
    }
  }
  if (!forward) for (let i = 0; i < N; i++) { re[i] /= N; im[i] /= N; }
}

function timeStretch(buffer, factor) {
  const N    = 2048;                      // FFT frame size
  const N2   = N >> 1;                    // Nyquist bin
  const hopA = N >> 2;                    // analysis hop = N/4 (75% overlap)
  const hopS = Math.round(hopA * factor); // synthesis hop

  const numCh  = buffer.numberOfChannels;
  const inLen  = buffer.length;
  const outLen = Math.round(inLen * factor) + N;
  const out    = AC.createBuffer(numCh, outLen, buffer.sampleRate);

  // Hanning window
  const win = new Float32Array(N);
  for (let i = 0; i < N; i++) win[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / N));

  // Precompute output normalization: sum of win² at each output sample position
  const norm = new Float32Array(outLen);
  for (let p = 0; p < outLen; p += hopS)
    for (let i = 0; i < N && p+i < outLen; i++) norm[p+i] += win[i] * win[i];

  const TWO_PI = 2 * Math.PI;
  const expectedDphi = TWO_PI * hopA / N;  // expected phase advance per bin per analysis hop

  for (let ch = 0; ch < numCh; ch++) {
    const inData  = buffer.getChannelData(ch);
    const outData = out.getChannelData(ch);

    const re        = new Float32Array(N);
    const im        = new Float32Array(N);
    const lastPhase = new Float32Array(N2 + 1);  // last analysis phase per bin
    const phaseAcc  = new Float32Array(N2 + 1);  // running synthesis phase per bin

    let inPos = 0, outPos = 0;

    while (outPos < outLen) {
      // Windowed analysis frame
      for (let i = 0; i < N; i++) {
        const idx = inPos + i;
        re[i] = idx < inLen ? inData[idx] * win[i] : 0;
        im[i] = 0;
      }

      pvFFT(re, im, true);

      // Phase vocoder: compute true instantaneous frequency, advance synthesis phase
      for (let k = 0; k <= N2; k++) {
        const mag   = Math.sqrt(re[k]*re[k] + im[k]*im[k]);
        const phase = Math.atan2(im[k], re[k]);

        // Phase deviation from the expected linear advance
        let dphi = phase - lastPhase[k] - k * expectedDphi;
        dphi -= TWO_PI * Math.round(dphi / TWO_PI);   // wrap to [-π, π]

        // Accumulate synthesis phase using true instantaneous frequency
        phaseAcc[k] += hopS * (k * TWO_PI / N + dphi / hopA);
        lastPhase[k] = phase;

        re[k] = mag * Math.cos(phaseAcc[k]);
        im[k] = mag * Math.sin(phaseAcc[k]);
      }

      // Restore conjugate symmetry for real-signal IFFT
      for (let k = 1; k < N2; k++) { re[N-k] = re[k]; im[N-k] = -im[k]; }
      im[0] = 0; im[N2] = 0;   // DC and Nyquist are purely real

      pvFFT(re, im, false);

      // Windowed overlap-add, normalized by precomputed window sum
      for (let i = 0; i < N; i++) {
        const idx = outPos + i;
        if (idx < outLen && norm[idx] > 1e-8)
          outData[idx] += re[i] * win[i] / norm[idx];
      }

      inPos  += hopA;
      outPos += hopS;
    }
  }

  return out;
}

async function setSpeedMode(mode) {
  if (S.isRecording) return;
  await ensureAC();

  // Tapping the active mode toggles back to normal
  const target = S.speedMode === mode ? null : mode;
  S.speedMode  = target;

  // Mark both buttons as processing
  const btnH = document.getElementById('mt-halfspeed');
  const btnQ = document.getElementById('mt-threequarter');
  btnH.classList.remove('on'); btnH.textContent = '...';
  btnQ.classList.remove('on'); btnQ.textContent = '...';
  setStatus('PROCESSING...');
  await sleep(0); // let UI paint before blocking JS

  for (let i = 0; i < 2; i++) {
    const t = S.tracks[i];
    if (!t.buf && !t.origBuf) continue;
    // Always restore original first so we re-stretch from clean audio
    if (t.origBuf) { t.buf = t.origBuf; t.origBuf = null; }
    if (!t.buf) continue;
    if (target === 'half') {
      t.origBuf = t.buf;
      t.buf     = timeStretch(t.buf, 2.0);
    } else if (target === 'three4') {
      t.origBuf = t.buf;
      t.buf     = timeStretch(t.buf, 4 / 3);
    }
    // target === null: already restored from origBuf above
    t.dur = t.buf.duration;
    refreshTrack(i);
  }

  // Sync loop length
  S.loopLen = calcLoopLen();

  // Restart playback with new buffers if transport is running
  if (S.isPlaying) {
    killAll();
    S.globalStart = AC.currentTime;
    S.tracks.forEach((t, i) => { if (t.buf) playTrack(i, AC.currentTime, 0); });
  }

  btnH.classList.toggle('on', target === 'half');
  btnQ.classList.toggle('on', target === 'three4');
  btnH.textContent = target === 'half'    ? '½ ON'    : '½ SPEED';
  btnQ.textContent = target === 'three4'  ? '¾ ON'    : '¾ SPEED';
  setStatus(target === 'half' ? 'HALF SPEED' : target === 'three4' ? '¾ SPEED' : 'READY');
}

// ── LATENCY COMPENSATION ─────────────────────────────────────────────────────

function trimBuffer(buf, trimSecs) {
  const sr         = buf.sampleRate;
  const trimSamps  = Math.min(Math.floor(trimSecs * sr), buf.length - 1);
  if (trimSamps <= 0) return buf;
  const newLen = buf.length - trimSamps;
  const out    = AC.createBuffer(buf.numberOfChannels, newLen, sr);
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    out.getChannelData(ch).set(buf.getChannelData(ch).subarray(trimSamps));
  }
  return out;
}

async function calibrate() {
  if (S.isCalibrating) return;
  S.isCalibrating = true;
  const btn = document.getElementById('cal-auto-btn');
  btn.classList.add('running');
  btn.textContent = '...';
  setStatus('CALIBRATING');

  try {
    await ensureAC();
    await ensureMic();

    const mime   = getMime();
    if (mime === null) { showErr('MEDIARECORDER NOT SUPPORTED'); return; }

    const mr     = new MediaRecorder(micStream, {
      ...(mime ? { mimeType: mime } : {}),
      audioBitsPerSecond: 256000,
    });
    const chunks = [];
    mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    // Note AC time right before starting recorder — this is t=0 of the recording
    const recStartAcTime = AC.currentTime;
    mr.start(50);

    // Wait for MediaRecorder to stabilise, then fire a click
    await sleep(350);
    const clickAcTime = AC.currentTime + 0.08;
    schedClick(clickAcTime, true);
    schedClick(clickAcTime, true); // double-tap for stronger peak on speaker

    // Record for another 1.2s to capture the click
    await sleep(1300);
    mr.stop();

    // Decode and find peak
    const buf = await new Promise((res, rej) => {
      mr.onstop = async () => {
        try {
          const blob = new Blob(chunks, { type: mime || 'audio/webm' });
          const ab   = await blob.arrayBuffer();
          res(await new Promise((r, j) => AC.decodeAudioData(ab, r, j)));
        } catch (e) { rej(e); }
      };
    });

    const data         = buf.getChannelData(0);
    const sr           = buf.sampleRate;
    // Expected sample position of the click in the recording
    const expectedSamp = Math.max(0, Math.floor((clickAcTime - recStartAcTime) * sr));
    // Search ±600ms around expected
    const searchStart  = Math.max(0,          expectedSamp - Math.floor(0.6 * sr));
    const searchEnd    = Math.min(data.length, expectedSamp + Math.floor(0.6 * sr));

    let maxVal = 0, peakSamp = expectedSamp;
    for (let i = searchStart; i < searchEnd; i++) {
      const a = Math.abs(data[i]);
      if (a > maxVal) { maxVal = a; peakSamp = i; }
    }

    const measuredOffset = (peakSamp - expectedSamp) / sr;

    if (maxVal < 0.03) {
      showErr('NO SIGNAL — RAISE VOLUME & RETRY');
    } else if (measuredOffset < 0 || measuredOffset > 0.8) {
      showErr('CAL RANGE ERROR — RETRY');
    } else {
      S.latencyOffset = measuredOffset;
      S.latencySet    = true;
      updateOffsetDisp();
      setStatus('OFFSET: ' + Math.round(S.latencyOffset * 1000) + 'MS');
    }
  } catch (e) {
    console.warn('calibrate:', e);
    showErr('CAL ERROR');
  }

  btn.classList.remove('running');
  btn.textContent = 'AUTO';
  S.isCalibrating = false;
}

function adjOffset(ms) {
  S.latencyOffset = Math.max(0, S.latencyOffset + ms / 1000);
  S.latencySet    = true;
  updateOffsetDisp();
}

function updateOffsetDisp() {
  const el = document.getElementById('cal-offset-disp');
  if (!S.latencySet) {
    el.textContent = '— ms';
    el.classList.add('unset');
  } else {
    el.textContent = Math.round(S.latencyOffset * 1000) + ' ms';
    el.classList.remove('unset');
  }
}

// ── PLAYBACK ─────────────────────────────────────────────────────────────────

function playTrack(idx, atAcTime, offset) {
  const t = S.tracks[idx];
  if (!t.buf || t.muted) return;
  killTrack(idx);

  // Persist gain + pan nodes across plays so live adjustments take effect immediately
  if (!t.gainNode) {
    t.gainNode = AC.createGain();
    t.panNode  = AC.createStereoPanner
      ? AC.createStereoPanner()
      : null;
    if (t.panNode) {
      t.gainNode.connect(t.panNode);
      t.panNode.connect(AC.destination);
    } else {
      t.gainNode.connect(AC.destination);
    }
  }
  t.gainNode.gain.value = t.vol;
  if (t.panNode) t.panNode.pan.value = t.pan;

  const src = AC.createBufferSource();
  src.buffer = t.buf;
  src.connect(t.gainNode);

  if (S.loopEnabled) {
    src.loop      = true;
    src.loopStart = 0;
    src.loopEnd   = Math.min(t.buf.duration, S.loopLen);
  }

  src.start(atAcTime, offset || 0);
  t.src = src;

  src.onended = () => {
    if (t.src === src) { t.src = null; refreshTrack(idx); }
  };
}

function killTrack(idx) {
  const t = S.tracks[idx];
  if (t.src) { try { t.src.stop(); } catch(_) {} t.src = null; }
}

function killAll() {
  S.tracks.forEach((_, i) => killTrack(i));
}

// ── COUNT-IN ─────────────────────────────────────────────────────────────────

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function doCountIn() {
  const overlay = document.getElementById('count-overlay');
  const bigEl   = document.getElementById('count-big');
  overlay.classList.add('visible');

  const beat = 60 / S.bpm;
  const t0   = AC.currentTime + 0.05;

  for (let i = 0; i < 4; i++) schedClick(t0 + i * beat, i === 0);

  for (let n = 4; n >= 1; n--) {
    bigEl.textContent = n;
    await sleep(beat * 1000);
  }

  overlay.classList.remove('visible');
}

// ── TRANSPORT ────────────────────────────────────────────────────────────────

async function handleRecord() {
  try {
    await ensureAC();

    // Determine track to record
    let idx = S.armed.findIndex(a => a);
    if (idx === -1) {
      idx = S.tracks.findIndex(t => !t.buf);
      if (idx === -1) { setStatus('CLR A TRACK FIRST'); return; }
      S.armed[idx] = true;
      refreshTrack(idx);
    }

    S.loopLen = calcLoopLen();

    if (S.countInOn) await doCountIn();

    const now       = AC.currentTime;
    S.globalStart   = now;
    S.isPlaying     = true;
    S.isRecording   = true;

    // Play back other track in loop
    S.recHasPlayback = S.tracks.some((tr, i) => i !== idx && tr.buf);
    S.tracks.forEach((tr, i) => {
      if (i !== idx && tr.buf) playTrack(i, now, 0);
    });

    if (S.metroOn) startMetro(now);

    await startRec(idx);
    refreshTransport();
    startClock();
  } catch (e) {
    console.warn('record:', e);
    S.isRecording = false;
    refreshTransport();
  }
}

async function handlePlay() {
  if (S.isPlaying) return;
  try {
    await ensureAC();
    S.loopLen     = calcLoopLen();
    S.globalStart = AC.currentTime;
    S.isPlaying   = true;

    S.tracks.forEach((tr, i) => { if (tr.buf) playTrack(i, AC.currentTime, 0); });
    if (S.metroOn) startMetro(AC.currentTime);

    refreshTransport();
    startClock();
  } catch (e) { console.warn('play:', e); }
}

function handleStop() {
  stopRec();
  killAll();
  stopMetro();
  stopClock();
  S.isPlaying   = false;
  S.isRecording = false;
  refreshTransport();
  S.tracks.forEach((_, i) => refreshTrack(i));
  setStatus('STOPPED');
}

function toggleLoop() {
  S.loopEnabled = !S.loopEnabled;
  document.getElementById('tbn-loop').classList.toggle('active', S.loopEnabled);
  const tag = document.getElementById('loop-tag');
  tag.textContent = S.loopEnabled ? 'LOOP ON' : 'LOOP OFF';
  tag.classList.toggle('on', S.loopEnabled);
}

// ── CLOCK ────────────────────────────────────────────────────────────────────

function startClock() {
  stopClock();
  function tick() {
    if (!AC) return;
    let pos = AC.currentTime - S.globalStart;
    if (pos < 0) pos = 0;
    if (S.loopEnabled && S.loopLen > 0) pos = pos % S.loopLen;
    const m = Math.floor(pos / 60);
    const s = (pos % 60).toFixed(1).padStart(4, '0');
    document.getElementById('time-disp').textContent = m + ':' + s;
    clockRAF = requestAnimationFrame(tick);
  }
  clockRAF = requestAnimationFrame(tick);
}

function stopClock() {
  if (clockRAF) { cancelAnimationFrame(clockRAF); clockRAF = null; }
  document.getElementById('time-disp').textContent = '0:00.0';
}

// ── TRACK CONTROLS ───────────────────────────────────────────────────────────

function toggleArm(idx) {
  S.armed[idx] = !S.armed[idx];
  if (S.armed[idx]) {
    // only one armed at a time
    S.armed[1 - idx] = false;
    refreshTrack(1 - idx);
  }
  refreshTrack(idx);
}

function soloTrack(idx) {
  const t = S.tracks[idx];
  if (!t.buf) return;
  ensureAC().then(() => {
    if (t.src) { killTrack(idx); }
    else        { playTrack(idx, AC.currentTime, 0); }
    refreshTrack(idx);
  });
}

function toggleMute(idx) {
  const t = S.tracks[idx];
  if (!t.buf) return;
  t.muted = !t.muted;
  if (t.muted) {
    killTrack(idx);
  } else if (S.isPlaying) {
    playTrack(idx, AC.currentTime, 0);
  }
  refreshTrack(idx);
}

function clearTrack(idx) {
  killTrack(idx);
  const t = S.tracks[idx];
  if (t.gainNode) { try { t.gainNode.disconnect(); } catch(_) {} t.gainNode = null; }
  if (t.panNode)  { try { t.panNode.disconnect();  } catch(_) {} t.panNode  = null; }
  t.buf = null; t.origBuf = null; t.dur = 0; t.muted = false; t.src = null; t.vol = 1.0; t.pan = 0;
  S.armed[idx] = false;
  document.getElementById('tl-' + idx).innerHTML = '';
  refreshTrack(idx);
  setStatus('TRACK ' + (idx === 0 ? 'A' : 'B') + ' CLEARED');
}

// ── BPM / BARS ───────────────────────────────────────────────────────────────

function adjBpm(d) {
  S.bpm = Math.max(40, Math.min(240, S.bpm + d));
  document.getElementById('bpm-val').textContent = S.bpm;
  S.loopLen = calcLoopLen();
}

function tapTempo() {
  const now = Date.now();
  if (now - S.lastTap > 2500) S.taps = [];
  S.taps.push(now);
  S.lastTap = now;
  if (S.taps.length > 1) {
    const diffs = [];
    for (let i = 1; i < S.taps.length; i++) diffs.push(S.taps[i] - S.taps[i - 1]);
    const avg = diffs.reduce((a, b) => a + b, 0) / diffs.length;
    S.bpm = Math.max(40, Math.min(240, Math.round(60000 / avg)));
    document.getElementById('bpm-val').textContent = S.bpm;
    S.loopLen = calcLoopLen();
  }
  if (S.taps.length > 8) S.taps.shift();
}

function setTrackLen() {
  S.useTrackLen = true;
  S.loopLen = calcLoopLen();
  document.querySelectorAll('.bar-opt').forEach(b => {
    b.classList.toggle('selected', b.dataset.bars === 'trk');
  });
}

function setBars(n) {
  S.useTrackLen = false;
  S.bars        = n;
  S.loopLen     = calcLoopLen();
  document.querySelectorAll('.bar-opt').forEach(b => {
    b.classList.toggle('selected', +b.dataset.bars === n);
  });
}

function updateBpmVisibility() {
  document.getElementById('bpm-controls').classList.toggle('hidden', !S.metroOn && !S.countInOn);
}

function toggleMetro() {
  S.metroOn = !S.metroOn;
  const btn = document.getElementById('mt-metro');
  btn.classList.toggle('on', S.metroOn);
  btn.textContent = S.metroOn ? '▶ METRO' : '◼ METRO';
  if (S.metroOn) {
    ensureAC().then(() => startMetro());
  } else {
    stopMetro();
  }
  updateBpmVisibility();
}

function toggleCountIn() {
  S.countInOn = !S.countInOn;
  const btn = document.getElementById('mt-countin');
  btn.classList.toggle('on', S.countInOn);
  btn.textContent = S.countInOn ? '↺ COUNT: ON' : '↺ COUNT-IN';
  updateBpmVisibility();
}

// ── UI REFRESH ───────────────────────────────────────────────────────────────

function refreshTrack(idx, override) {
  const t       = S.tracks[idx];
  const armed   = S.armed[idx];
  const isRecTk = S.isRecording && S.recTrack === idx;

  const tsEl    = document.getElementById('ts-' + idx);
  const armBtn  = document.getElementById('tb-arm-' + idx);
  const soloBtn = document.getElementById('tb-solo-' + idx);
  const muteBtn = document.getElementById('tb-mute-' + idx);
  const clrBtn  = document.getElementById('tb-clr-' + idx);
  const tlEl    = document.getElementById('tl-' + idx);

  // State label
  if (override === 'rec' || isRecTk) {
    tsEl.innerHTML  = '<span class="rpulse"></span>REC';
    tsEl.className  = 'track-state s-rec';
  } else if (armed) {
    tsEl.textContent = 'ARMED';
    tsEl.className   = 'track-state s-armed';
  } else if (t.buf) {
    tsEl.textContent = t.muted ? 'MUTED' : (t.src ? 'PLAY' : 'READY');
    tsEl.className   = 'track-state s-ready';
  } else {
    tsEl.textContent = '—';
    tsEl.className   = 'track-state';
  }

  // Arm button highlight
  armBtn.classList.toggle('tb-armed', armed);

  // Audio-dependent buttons
  const has = !!t.buf;
  [soloBtn, muteBtn, clrBtn].forEach(b => b.classList.toggle('tb-off', !has));
  if (has) {
    soloBtn.classList.toggle('tb-playing', !!t.src && !t.muted);
    muteBtn.classList.toggle('tb-muted', t.muted);
  }

  // Timeline block
  if (has) {
    const ll  = S.loopLen > 0 ? S.loopLen : calcLoopLen();
    const pct = Math.min(100, (t.dur / ll) * 100).toFixed(2);
    let blk   = tlEl.querySelector('.tl-block:not(.preview)');
    if (!blk) {
      blk = document.createElement('div');
      blk.className = 'tl-block';
      tlEl.appendChild(blk);
    }
    blk.style.left  = '0px';
    blk.style.width = pct + '%';
    blk.classList.toggle('muted', t.muted);
  }

  // Armed preview ghost (when armed, no audio yet)
  const preview = tlEl.querySelector('.tl-block.preview');
  if (armed && !has) {
    if (!preview) {
      const g = document.createElement('div');
      g.className = 'tl-block preview';
      tlEl.appendChild(g);
    }
  } else if (preview) {
    preview.remove();
  }
}

function refreshTransport() {
  document.getElementById('tbn-rec').classList.toggle('active', S.isRecording);
  document.getElementById('tbn-play').classList.toggle('active', S.isPlaying && !S.isRecording);
  const hasAudio = S.tracks.some(t => t.buf);
  document.getElementById('tbn-share').classList.toggle('off', !hasAudio);
}

function setStatus(msg) {
  document.getElementById('app-status').textContent = msg;
}

function showErr(msg) {
  const el = document.getElementById('err-banner');
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 4000);
}

// ── MIXER ─────────────────────────────────────────────────────────────────────

function toggleView() {
  const inMixer = document.getElementById('mixer-view').classList.toggle('visible');
  document.querySelector('.content').style.display = inMixer ? 'none' : '';
  const btn = document.getElementById('view-btn');
  btn.textContent = inMixer ? 'TRACKS' : 'MIX';
  btn.classList.toggle('active', inMixer);
  if (inMixer) syncMixerUI();
}

function setVol(idx, value) {
  const t = S.tracks[idx];
  t.vol   = value / 100;
  if (t.gainNode) t.gainNode.gain.setTargetAtTime(t.vol, AC.currentTime, 0.01);
  updateVolUI(idx, value);
}

function setPan(idx, value) {
  const t = S.tracks[idx];
  t.pan   = value / 100;   // -1.0 … +1.0
  if (t.panNode) t.panNode.pan.setTargetAtTime(t.pan, AC.currentTime, 0.01);
  updatePanUI(idx, value);
}

function updateVolUI(idx, value) {
  const fader    = document.getElementById('fader-' + idx);
  const dbEl     = document.getElementById('mix-db-' + idx);
  const vol      = value / 100;
  const isSilent = vol === 0;
  fader.style.setProperty('--fill', value);
  fader.classList.toggle('silent', isSilent);
  dbEl.textContent = isSilent ? '—∞ dB' : volToDb(vol);
  dbEl.classList.toggle('silent', isSilent);
}

function updatePanUI(idx, value) {
  const el  = document.getElementById('mix-pan-' + idx);
  const val = parseInt(value);
  el.textContent = val === 0 ? 'C' : (val < 0 ? 'L ' + Math.abs(val) : 'R ' + val);
  const canvas = document.getElementById('pan-dial-' + idx);
  if (canvas) drawDial(canvas, val);
}

// ── PAN DIAL (ROTARY CANVAS) ──────────────────────────────────────────────────

const DIAL_MIN_A = -Math.PI * 5 / 4;   // 7 o'clock
const DIAL_MAX_A =  Math.PI / 4;        // 5 o'clock
const DIAL_CTR_A = -Math.PI / 2;        // 12 o'clock (top)

function drawDial(canvas, pan) {
  // pan: integer -100 … +100
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth  || 60;
  const H = canvas.offsetHeight || 60;
  if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const r  = Math.min(W, H) / 2 - 6;
  const panNorm = pan / 100;                            // -1 … +1
  const angle   = DIAL_CTR_A + panNorm * (Math.PI * 3 / 4);

  const st = getComputedStyle(document.documentElement);
  const border = st.getPropertyValue('--border').trim() || '#e0e0e0';
  const text   = st.getPropertyValue('--text').trim()   || '#111111';
  const text2  = st.getPropertyValue('--text2').trim()  || '#666666';
  const text3  = st.getPropertyValue('--text3').trim()  || '#bbbbbb';

  // Travel arc (background)
  ctx.beginPath();
  ctx.arc(cx, cy, r - 2, DIAL_MIN_A, DIAL_MAX_A);
  ctx.strokeStyle = border;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Deviation arc from center to current angle
  if (pan !== 0) {
    ctx.beginPath();
    if (pan > 0) {
      ctx.arc(cx, cy, r - 2, DIAL_CTR_A, angle);
    } else {
      ctx.arc(cx, cy, r - 2, angle, DIAL_CTR_A);
    }
    ctx.strokeStyle = text2;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Center detent tick at 12 o'clock
  ctx.beginPath();
  ctx.moveTo(cx + (r - 7) * Math.cos(DIAL_CTR_A), cy + (r - 7) * Math.sin(DIAL_CTR_A));
  ctx.lineTo(cx + (r - 2) * Math.cos(DIAL_CTR_A), cy + (r - 2) * Math.sin(DIAL_CTR_A));
  ctx.strokeStyle = text3;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Indicator dot
  const indR = r - 7;
  ctx.beginPath();
  ctx.arc(cx + indR * Math.cos(angle), cy + indR * Math.sin(angle), 2.5, 0, Math.PI * 2);
  ctx.fillStyle = pan === 0 ? text3 : text;
  ctx.fill();
}

function initDials() {
  [0, 1].forEach(idx => {
    const canvas = document.getElementById('pan-dial-' + idx);
    if (!canvas) return;
    drawDial(canvas, Math.round(S.tracks[idx].pan * 100));

    let startX = null, startY = null, startPan = null, lastTapTime = 0;

    canvas.addEventListener('pointerdown', e => {
      const now = Date.now();
      if (now - lastTapTime < 300) {
        setPan(idx, 0);
        lastTapTime = 0;
        return;
      }
      lastTapTime = now;
      startX   = e.clientX;
      startY   = e.clientY;
      startPan = Math.round(S.tracks[idx].pan * 100);
      canvas.setPointerCapture(e.pointerId);
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('pointermove', e => {
      if (startY === null) return;
      // Drag up or right = pan right (+), drag down or left = pan left (−)
      const dx     = e.clientX - startX;
      const dy     = startY - e.clientY;
      const newPan = Math.max(-100, Math.min(100, startPan + dx + dy));
      setPan(idx, newPan);
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('pointerup',     () => { startX = null; startY = null; startPan = null; });
    canvas.addEventListener('pointercancel', () => { startX = null; startY = null; startPan = null; });
  });
}

function volToDb(vol) {
  if (vol <= 0) return '—∞ dB';
  const db = 20 * Math.log10(vol);
  return (db >= 0 ? '+' : '') + db.toFixed(1) + ' dB';
}

function syncMixerUI() {
  S.tracks.forEach((t, i) => {
    const volVal = Math.round(t.vol * 100);
    document.getElementById('fader-' + i).value = volVal;
    updateVolUI(i, volVal);
    // Force canvas resize on first reveal (was hidden, so offsetWidth was 0)
    const canvas = document.getElementById('pan-dial-' + i);
    if (canvas) { canvas.width = 0; canvas.height = 0; }
    updatePanUI(i, Math.round(t.pan * 100));
  });
}

// ── FILENAME PROMPT ───────────────────────────────────────────────────────────

let _fnameResolve = null;

function promptFilename(defaultName) {
  return new Promise(resolve => {
    _fnameResolve = resolve;
    const input = document.getElementById('fname-input');
    input.value = defaultName || '';
    document.getElementById('fname-backdrop').classList.add('visible');
    // Slight delay so the panel animates in before keyboard opens
    setTimeout(() => input.focus(), 80);
  });
}

function resolveFname(val) {
  document.getElementById('fname-backdrop').classList.remove('visible');
  document.getElementById('fname-input').blur();
  if (!_fnameResolve) return;
  const input = document.getElementById('fname-input');
  const name  = (val === null) ? null : (input.value.trim() || 'zweispur-mix');
  _fnameResolve(name);
  _fnameResolve = null;
}

// ── SHARE / EXPORT ───────────────────────────────────────────────────────────

// Lamejs loaded lazily on first share
let _lameReady = null;
function loadLame() {
  if (_lameReady) return _lameReady;
  _lameReady = new Promise((resolve, reject) => {
    const s  = document.createElement('script');
    s.src    = 'https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js';
    s.onload  = resolve;
    s.onerror = () => reject(new Error('Failed to load MP3 encoder'));
    document.head.appendChild(s);
  });
  return _lameReady;
}

async function shareMix() {
  const t0 = S.tracks[0], t1 = S.tracks[1];
  if (!t0.buf && !t1.buf) return;

  const filename = await promptFilename('zweispur-mix');
  if (!filename) return;   // user cancelled

  const btn = document.getElementById('tbn-share');
  btn.style.opacity = '0.5';

  try {
    await ensureAC();

    setStatus('LOADING ENCODER...');
    await loadLame();

    // Always render at 44100 Hz — lamejs max supported rate, and ensures
    // correct encoding regardless of device AudioContext sample rate (often 48kHz)
    const EXPORT_SR  = 44100;
    const loopLen    = S.loopLen > 0 ? S.loopLen : calcLoopLen();
    const numSamples = Math.ceil(loopLen * EXPORT_SR);
    const offCtx = new OfflineAudioContext(2, numSamples, EXPORT_SR);

    [[t0, 0], [t1, 1]].forEach(([t]) => {
      if (!t.buf) return;
      const src = offCtx.createBufferSource();
      const g   = offCtx.createGain();
      src.buffer   = t.buf;
      g.gain.value = t.muted ? 0 : t.vol;
      src.connect(g);
      if (offCtx.createStereoPanner) {
        const p   = offCtx.createStereoPanner();
        p.pan.value = t.pan;
        g.connect(p); p.connect(offCtx.destination);
      } else {
        g.connect(offCtx.destination);
      }
      src.start(0);
    });

    setStatus('RENDERING...');
    const rendered = await offCtx.startRendering();

    setStatus('ENCODING MP3...');
    // Yield to UI before blocking encode loop
    await sleep(0);
    const mp3Blob = encodeMp3(rendered);
    const file    = new File([mp3Blob], filename + '.mp3', { type: 'audio/mpeg' });

    setStatus('READY');

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'ZWEISPUR MIX' });
    } else {
      // Desktop fallback: trigger download
      const url = URL.createObjectURL(file);
      const a   = Object.assign(document.createElement('a'), { href: url, download: filename + '.mp3' });
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 8000);
    }
  } catch (e) {
    if (e.name !== 'AbortError') { showErr('SHARE FAILED'); console.warn(e); }
    setStatus('READY');
  }

  btn.style.opacity = '';
}

function encodeMp3(buffer) {
  const sr        = buffer.sampleRate;   // 44100
  const encoder   = new lamejs.Mp3Encoder(2, sr, 320);  // stereo, 44100 Hz, 320 kbps
  const blockSize = 1152;                // must be multiple of 576 for lamejs

  const left  = floatToInt16(buffer.getChannelData(0));
  const right = floatToInt16(buffer.getChannelData(1));

  const chunks = [];
  for (let i = 0; i < buffer.length; i += blockSize) {
    const l   = left.subarray(i, i + blockSize);
    const r   = right.subarray(i, i + blockSize);
    const out = encoder.encodeBuffer(l, r);
    if (out.length > 0) chunks.push(new Uint8Array(out));
  }
  const tail = encoder.flush();
  if (tail.length > 0) chunks.push(new Uint8Array(tail));

  return new Blob(chunks, { type: 'audio/mpeg' });
}

function floatToInt16(float32) {
  const out = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    const s = Math.max(-1, Math.min(1, float32[i]));
    out[i]  = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return out;
}

// ── APP ICON ─────────────────────────────────────────────────────────────────

function buildAppIcon() {
  const sz  = 180;
  const c   = document.createElement('canvas');
  c.width   = c.height = sz;
  const ctx = c.getContext('2d');
  const cx  = sz / 2;

  // Background
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, sz, sz);

  ctx.fillStyle = '#ffffff';

  // ── Ball head (classic SM-style mesh grille) ──
  const ballR  = 38;
  const ballCY = 54;

  ctx.beginPath();
  ctx.arc(cx, ballCY, ballR, 0, Math.PI * 2);
  ctx.fill();

  // Horizontal grill lines clipped to ball
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, ballCY, ballR, 0, Math.PI * 2);
  ctx.clip();
  ctx.strokeStyle = '#111111';
  ctx.lineWidth   = 2.5;
  for (let y = ballCY - ballR + 8; y < ballCY + ballR; y += 9) {
    ctx.beginPath();
    ctx.moveTo(cx - ballR, y);
    ctx.lineTo(cx + ballR, y);
    ctx.stroke();
  }
  ctx.restore();

  // ── Grip body below ball ──
  ctx.fillStyle = '#ffffff';
  const bodyW = 20, bodyH = 30;
  ctx.fillRect(cx - bodyW / 2, ballCY + ballR, bodyW, bodyH);

  // ── Collar ──
  const collarW = 46, collarH = 7;
  ctx.fillRect(cx - collarW / 2, ballCY + ballR + bodyH, collarW, collarH);

  // ── Thin neck ──
  const neckW = 12, neckH = 22;
  const neckY = ballCY + ballR + bodyH + collarH;
  ctx.fillRect(cx - neckW / 2, neckY, neckW, neckH);

  // ── Base plate ──
  const baseW = 68, baseH = 9;
  ctx.fillRect(cx - baseW / 2, neckY + neckH, baseW, baseH);

  return c.toDataURL('image/png');
}

// ── INIT ─────────────────────────────────────────────────────────────────────

S.loopLen = calcLoopLen();

if (!window.AudioContext && !window.webkitAudioContext) {
  showErr('WEB AUDIO NOT SUPPORTED — USE SAFARI 14.3+');
}

// Init pan dials
initDials();

// Hide BPM controls until METRO or COUNT-IN is active
updateBpmVisibility();

// Inject home screen & favicon icons
(function () {
  const url = buildAppIcon();
  [
    { rel: 'apple-touch-icon', sizes: '180x180' },
    { rel: 'icon', type: 'image/png', sizes: '180x180' },
  ].forEach(attrs => {
    const link = Object.assign(document.createElement('link'), attrs);
    link.href  = url;
    document.head.appendChild(link);
  });
}());
</script>
